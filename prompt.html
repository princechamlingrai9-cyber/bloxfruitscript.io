<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blox Fruits Script</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .rainbow-button {
      padding: 20px 50px;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      background: linear-gradient(270deg, red, orange, yellow, green, blue, indigo, violet);
      background-size: 1400% 1400%;
      animation: rainbowShift 8s ease infinite, glowPulse 2s infinite alternate;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.7);
      transition: transform 0.3s ease;
    }

    @keyframes rainbowShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes glowPulse {
      from {
        box-shadow: 0 0 15px red, 0 0 30px orange, 0 0 45px yellow;
      }
      to {
        box-shadow: 0 0 25px green, 0 0 40px blue, 0 0 55px violet;
      }
    }

    .rainbow-button:hover {
      transform: scale(1.15) rotate(2deg);
    }
  </style>
</head>
<body>
  <a href="https://linkvertise.com/posts/create/meta" class="rainbow-button">Get your script</a>
</body>
</html>
