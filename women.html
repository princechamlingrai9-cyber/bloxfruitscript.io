<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Women's Shopping - SAGA_STORE</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: url('photos/img1.jpg') no-repeat center center fixed;
      background-size: cover;
    }
    header {
      background-color: rgba(44, 62, 80, 0.8);
      color: white;
      padding: 15px;
      text-align: center;
    }
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }
    .product {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #ddd;
      border-radius: 8px;
      margin: 10px;
      padding: 15px;
      width: 200px;
      text-align: center;
    }
    .product img {
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

  <header>
    <h1>👗 Women's Collection</h1>
  </header>

  <section class="products">
    <div class="product">
      <img src="photos/women1.jpg" alt="Women Item 1">
      <h3>Women's Dress</h3>
      <p>$40.00</p>
    </div>
    <div class="product">
      <img src="photos/women2.jpg" alt="Women Item 2">
      <h3>Women's Handbag</h3>
      <p>$60.00</p>
    </div>
    <div class="product">
      <img src="photos/women3.jpg" alt="Women Item 3">
      <h3>Women's Shoes</h3>
      <p>$50.00</p>
    </div>
  </section>

</body>
</html>
