<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGA_STORE</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: 
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('photos/img1.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
}

/* HEADER */
header {
  background-color: rgba(44, 62, 80, 0.8);
  padding: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  text-align: center;
}

header img {
  height: 60px;
  margin-right: 10px;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  background-color: rgba(52, 73, 94, 0.8);
}

nav a {
  color: white;
  padding: 12px 16px;
  text-decoration: none;
  border-radius: 8px;
  transition: 0.3s;
}

/* Hover Effect */
nav a:hover {
  background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
  background-size: 400% 400%;
  animation: rainbowShift 3s linear infinite;
  transform: scale(1.1);
}

/* DROPDOWN */
.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: rgba(52, 73, 94, 0.95);
  border-radius: 8px;
  min-width: 150px;
}

.dropdown-content a {
  display: block;
  padding: 10px;
}

.dropdown:hover .dropdown-content {
  display: block;
}

/* BANNER */
.banner {
  text-align: center;
  padding: 20px;
  background-color: rgba(236, 240, 241, 0.9);
  border-radius: 10px;
  margin: 20px auto;
  width: 90%;
  max-width: 800px;
  color: #333;
}

/* BUTTON */
.rainbow-btn {
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
  background-size: 400% 400%;
  color: white;
}

.rainbow-btn:hover {
  animation: rainbowShift 3s linear infinite;
  transform: scale(1.1);
}

/* CONTACT */
.contact {
  background-color: rgba(255, 255, 255, 0.9);
  margin: 20px auto;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 600px;
  text-align: center;
  color: #333;
}

/* ANIMATION */
@keyframes rainbowShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 📱 MOBILE VIEW */
@media (max-width: 768px) {
  header {
    flex-direction: column;
  }

  nav {
    flex-direction: column;
    align-items: center;
  }

  nav a {
    width: 100%;
    text-align: center;
  }
}

/* 📺 LARGE SCREENS (TV / MONITOR) */
@media (min-width: 1200px) {
  .banner {
    font-size: 1.5rem;
  }

  .rainbow-btn {
    font-size: 24px;
    padding: 20px 40px;
  }
}
</style>
</head>

<body>

<header>
  <img src="photos/img2.jpg">
  <div>
    <h1>🛒 Welcome to SAGA_STORE</h1>
    <p>Shop Smart, Shop SAGA!</p>
  </div>
</header>

<nav>
  <a href="men.html">Men</a>
  <a href="women.html">Women</a>
  <a href="kids.html">Kids</a>
  <a href="electronics.html">Electronics</a>
  <a href="#contact">Contact</a>

  <div class="dropdown">
    <a href="#">Support ▾</a>
    <div class="dropdown-content">
      <a href="help.html">Help</a>
      <a href="feedback.html">Feedback</a>
    </div>
  </div>
</nav>

<div class="banner">
  <h1>Big Sale Today!</h1>
  <p>Get up to 50% off on selected items</p>
  <button class="rainbow-btn" onclick="alert('Good luck bro! 🎉')">
    BEST! OF LUCK
  </button>
</div>

<div id="contact" class="contact">
  <h2>Contact Us</h2>
  <p>Email: princechamlingrai10@gmail.com</p>
  <p>Phone: 9874561230</p>
</div>

</body>
</html>
