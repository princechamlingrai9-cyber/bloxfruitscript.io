<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAGA_STORE</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: url('photos/img1.jpg') no-repeat center center fixed;
      background-size: cover;
    }
    header {
      background-color: rgba(44, 62, 80, 0.8);
      color: white;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    header img {
      height: 80px;
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
    }
    header h1, header p {
      margin: 0;
      text-align: center;
    }
    nav {
      display: flex;
      justify-content: center;
      background-color: rgba(52, 73, 94, 0.8);
    }
    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
    }
    nav a:hover {
      background-color: #1abc9c;
    }
    .banner {
      text-align: center;
      padding: 40px;
      background-color: rgba(236, 240, 241, 0.85);
      border-radius: 10px;
      margin: 20px auto;
      width: 80%;
    }

    /* Rainbow Button Styles */
    .rainbow-btn {
      display: inline-block;
      padding: 20px 40px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
      background-size: 400% 400%;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .rainbow-btn:hover {
      animation: rainbowShift 3s linear infinite;
      transform: scale(1.1);
    }

    @keyframes rainbowShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>

 <header>
  <img src="photos/img2.jpg" alt="SAGA_STORE Logo">
  <div>
    <h1>🛒 Welcome to SAGA_STORE</h1>
    <p>Shop Smart, Shop SAGA!</p>
  </div>
</header>

  <nav>
    <a href="men.html">Men</a>
    <a href="women.html">Women</a>
    <a href="kids.html">Kids</a>
    <a href="electronics.html">Electronics</a>
  </nav>

  <div class="banner">
    <h1>Big Sale Today!</h1>
    <p>Get up to 50% off on selected items</p>
    <!-- Rainbow Button -->
    <button class="rainbow-btn">BEST! OF LUCK</button>
  </div>

</body>
</html>
